[project]
name = "selko"
version = "0.1.0"
description = "Selko backend - shared business logic and services"
readme = "../README.md"
requires-python = ">=3.10"
dependencies = [
    "google-api-python-client>=2.188.0",
    "google-auth-httplib2>=0.3.0",
    "google-auth-oauthlib>=1.2.4",
    "python-dotenv>=1.2.1",
    "supabase>=2.27.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["selko"]
