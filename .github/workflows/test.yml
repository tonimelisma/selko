name: Tests

# CI Optimization: Path filtering skips jobs when irrelevant files change.
# - Markdown-only changes: No test jobs run
# - Backend changes: Unit tests run
# - Frontend changes: Handled by frontend-tests.yml (separate workflow)
# - Supabase changes: Staging deploy + integration tests
# - Android changes: Android tests only

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      supabase: ${{ steps.filter.outputs.supabase }}
      android: ${{ steps.filter.outputs.android }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'cli/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/test.yml'
            supabase:
              - 'supabase/**'
            android:
              - 'android/**'

  unit-tests:
    name: Unit Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv sync --extra test
          uv pip install pytest-xdist

      - name: Run unit tests
        run: uv run pytest backend/tests/ -m "not integration" -v --tb=short -n auto

  android-unit-tests:
    name: Android Unit Tests
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run unit tests
        working-directory: android
        run: ./gradlew test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: android-unit-test-results
          path: android/app/build/reports/tests/

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    # Only run on main branch pushes when backend/supabase files changed
    # Note: always() required because skipped dependencies would fail this job otherwise
    # We check that required jobs either succeeded or were skipped (not failed)
    if: |
      always() &&
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.supabase == 'true') &&
      (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'skipped') &&
      (needs.android-unit-tests.result == 'success' || needs.android-unit-tests.result == 'skipped')
    needs: [changes, unit-tests, android-unit-tests]
    steps:
      - uses: actions/checkout@v4

      # Deploy database migrations first (atomic deployment requirement)
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Staging Supabase
        run: supabase link --project-ref lxmysergoeaegxlyfzwk
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy migrations to Staging
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_SUPABASE_DB_PASSWORD }}

      - name: Deploy to Render (Staging)
        run: |
          echo "Triggering Render deployments..."
          for hook_name in "App:${{ secrets.RENDER_DEPLOY_HOOK_APP_STAGING }}" "Web:${{ secrets.RENDER_DEPLOY_HOOK_WEB_STAGING }}"; do
            name="${hook_name%%:*}"
            url="${hook_name#*:}"
            if [ -z "$url" ]; then
              echo "  ${name} deploy hook not configured, skipping"
              continue
            fi
            for attempt in 1 2; do
              status=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$url")
              if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
                echo "  ${name} deploy hook triggered successfully (HTTP ${status})"
                break
              else
                echo "  ${name} deploy hook returned HTTP ${status} (attempt ${attempt}/2)"
                if [ "$attempt" -eq 2 ]; then
                  echo "  ERROR: ${name} deploy hook failed after 2 attempts"
                  exit 1
                fi
                sleep 5
              fi
            done
          done
          echo "Deploy hooks triggered. Builds will complete asynchronously."

  integration-tests-staging:
    name: Integration Tests (Staging)
    runs-on: ubuntu-latest
    # Only run on main branch pushes (after deployment succeeds)
    # Skipped when deploy-staging is skipped (no backend/supabase changes)
    if: |
      always() &&
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.deploy-staging.result == 'success'
    needs: [deploy-staging]  # Run AFTER deployment to test deployed code
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv sync --extra test
          uv pip install pytest-xdist

      - name: Run staging integration tests (mocked LLM)
        # Parallelized - each test uses isolated data (uuid4 IDs, temp_user fixtures, SKIP LOCKED claiming)
        run: uv run pytest backend/tests/integration/ -m "staging" -v --tb=short -n auto
        env:
          ENVIRONMENT: staging
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.STAGING_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_EMAIL: ${{ secrets.STAGING_TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.STAGING_TEST_USER_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # NOTE: Uses mocked LLM to avoid API costs. Run `uv run pytest --run-llm` locally for real LLM tests.

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # Only run on manual workflow_dispatch or git tags
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    # No dependencies - production deployment is independent
    steps:
      - uses: actions/checkout@v4

      # Deploy database migrations first (atomic deployment requirement)
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Production Supabase
        run: supabase link --project-ref khahcozfbnpykspvatrg
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy migrations to Production
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_SUPABASE_DB_PASSWORD }}

      - name: Deploy to Render (Production)
        run: |
          echo "Triggering Render deployments..."
          for hook_name in "App:${{ secrets.RENDER_DEPLOY_HOOK_APP_PRODUCTION }}" "Web:${{ secrets.RENDER_DEPLOY_HOOK_WEB_PRODUCTION }}"; do
            name="${hook_name%%:*}"
            url="${hook_name#*:}"
            if [ -z "$url" ]; then
              echo "  ${name} deploy hook not configured, skipping"
              continue
            fi
            for attempt in 1 2; do
              status=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$url")
              if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
                echo "  ${name} deploy hook triggered successfully (HTTP ${status})"
                break
              else
                echo "  ${name} deploy hook returned HTTP ${status} (attempt ${attempt}/2)"
                if [ "$attempt" -eq 2 ]; then
                  echo "  ERROR: ${name} deploy hook failed after 2 attempts"
                  exit 1
                fi
                sleep 5
              fi
            done
          done
          echo "Deploy hooks triggered. Builds will complete asynchronously."
