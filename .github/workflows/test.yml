name: Tests

# CI Optimization: Path filtering skips jobs when irrelevant files change.
# - Markdown-only changes: No test jobs run
# - Backend changes: Unit tests + integration tests
# - Supabase changes: Integration tests only
# - Android changes: Android tests only

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      supabase: ${{ steps.filter.outputs.supabase }}
      android: ${{ steps.filter.outputs.android }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'cli/**'
              - 'pyproject.toml'
              - 'uv.lock'
            supabase:
              - 'supabase/**'
            android:
              - 'android/**'

  unit-tests:
    name: Unit Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv sync --extra test
          uv pip install pytest-xdist

      - name: Run unit tests
        run: uv run pytest backend/tests/ -m "not integration" -v --tb=short -n auto

  integration-tests-development:
    name: Integration Tests (Development)
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.supabase == 'true'
    runs-on: ubuntu-latest
    # Queue concurrent runs — persistent VM can only handle one db reset at a time
    concurrency:
      group: ci-supabase-vm
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv sync --extra test
          uv pip install pytest-xdist

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CI_SUPABASE_SSH_KEY }}" > ~/.ssh/ci_vm
          chmod 600 ~/.ssh/ci_vm
          ssh-keyscan -H ${{ secrets.CI_SUPABASE_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Verify VM health
        run: |
          ssh -i ~/.ssh/ci_vm -o ConnectTimeout=10 \
            ${{ secrets.CI_SUPABASE_USER }}@${{ secrets.CI_SUPABASE_HOST }} \
            "curl -sf http://localhost:54321/rest/v1/ > /dev/null && echo 'Supabase API healthy'"

      - name: Sync migrations and reset database
        run: |
          scp -i ~/.ssh/ci_vm -r supabase/migrations/ \
            ${{ secrets.CI_SUPABASE_USER }}@${{ secrets.CI_SUPABASE_HOST }}:/opt/selko/supabase/migrations/
          # supabase db reset can fail if storage container is slow to restart.
          # Retry up to 3 times with a wait between attempts.
          for attempt in 1 2 3; do
            echo "Attempt ${attempt}/3: supabase db reset"
            if ssh -i ~/.ssh/ci_vm \
              ${{ secrets.CI_SUPABASE_USER }}@${{ secrets.CI_SUPABASE_HOST }} \
              "cd /opt/selko && supabase db reset"; then
              echo "supabase db reset succeeded on attempt ${attempt}"
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "supabase db reset failed after 3 attempts"
              exit 1
            fi
            echo "supabase db reset failed, waiting 15s before retry..."
            sleep 15
          done

      - name: Establish SSH tunnel
        run: |
          ssh -i ~/.ssh/ci_vm -fN \
            -L 54321:localhost:54321 \
            -L 54322:localhost:54322 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            -o ExitOnForwardFailure=yes \
            ${{ secrets.CI_SUPABASE_USER }}@${{ secrets.CI_SUPABASE_HOST }}
          # Verify tunnel is working
          for i in $(seq 1 10); do
            if curl -sf http://localhost:54321/rest/v1/ > /dev/null 2>&1; then
              echo "SSH tunnel established and Supabase reachable"
              exit 0
            fi
            sleep 1
          done
          echo "SSH tunnel failed to establish"
          exit 1

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=http://localhost:54321" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.CI_SUPABASE_ANON_KEY }}" >> .env
          echo "SUPABASE_PUBLISHABLE_KEY=${{ secrets.CI_SUPABASE_ANON_KEY }}" >> .env
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY }}" >> .env
          echo "TEST_USER_EMAIL=test@selko.local" >> .env
          echo "TEST_USER_PASSWORD=testpass123" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env

      - name: Create test user
        run: |
          uv run python -m cli.cli_user create \
            --email test@selko.local \
            --password testpass123 \
            --auto-confirm 2>&1 || echo "Note: User may already exist (this is OK)"
        env:
          ENVIRONMENT: development
          TEST_USER_EMAIL: test@selko.local
          TEST_USER_PASSWORD: testpass123

      - name: Seed Gmail tokens from staging
        run: |
          uv run python -m cli.cli_seed_tokens \
            --from staging --to development --provider gmail
        env:
          SOURCE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SOURCE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          TARGET_SUPABASE_URL: http://localhost:54321
          TARGET_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_EMAIL: test@selko.local
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

      - name: Run integration tests (mocked LLM)
        # Run sequentially - integration tests have shared DB state that breaks with parallel execution
        run: uv run pytest backend/tests/integration/ -m "development" -v --tb=short
        env:
          ENVIRONMENT: development
          TEST_USER_EMAIL: test@selko.local
          TEST_USER_PASSWORD: testpass123
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # NOTE: Does NOT use --run-llm flag, so LLM tests are skipped (mocked versions run instead)

      - name: Cleanup SSH tunnel
        if: always()
        run: |
          pkill -f "ssh.*ci_vm.*-L 54321" || true
          rm -f ~/.ssh/ci_vm

  android-unit-tests:
    name: Android Unit Tests
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run unit tests
        working-directory: android
        run: ./gradlew test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: android-unit-test-results
          path: android/app/build/reports/tests/

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    # Only run on main branch pushes when backend/supabase files changed
    # Note: always() required because skipped dependencies would fail this job otherwise
    # We check that required jobs either succeeded or were skipped (not failed)
    if: |
      always() &&
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.supabase == 'true') &&
      (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'skipped') &&
      (needs.integration-tests-development.result == 'success' || needs.integration-tests-development.result == 'skipped') &&
      (needs.android-unit-tests.result == 'success' || needs.android-unit-tests.result == 'skipped')
    needs: [changes, unit-tests, integration-tests-development, android-unit-tests]
    steps:
      - uses: actions/checkout@v4

      # Deploy database migrations first (atomic deployment requirement)
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Staging Supabase
        run: supabase link --project-ref lxmysergoeaegxlyfzwk
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy migrations to Staging
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy to Render (Staging)
        run: |
          echo "Triggering Render deployments..."
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_APP_STAGING }}" || echo "App deploy hook failed or not configured"
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_WEB_STAGING }}" || echo "Web deploy hook failed or not configured"
          echo "Deploy hooks triggered. Builds will complete asynchronously."

  integration-tests-staging:
    name: Integration Tests (Staging)
    runs-on: ubuntu-latest
    # Only run on main branch pushes (after deployment succeeds)
    # Skipped when deploy-staging is skipped (no backend/supabase changes)
    if: |
      always() &&
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.deploy-staging.result == 'success'
    needs: [deploy-staging]  # Run AFTER deployment to test deployed code
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv sync --extra test
          uv pip install pytest-xdist

      - name: Run staging integration tests (mocked LLM)
        # Run sequentially - integration tests have shared DB state that breaks with parallel execution
        run: uv run pytest backend/tests/integration/ -m "staging" -v --tb=short
        env:
          ENVIRONMENT: staging
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.STAGING_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_EMAIL: ${{ secrets.STAGING_TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.STAGING_TEST_USER_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # NOTE: Uses mocked LLM to avoid API costs. Run `uv run pytest --run-llm` locally for real LLM tests.

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # Only run on manual workflow_dispatch or git tags
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    # No dependencies - production deployment is independent
    steps:
      - uses: actions/checkout@v4

      # Deploy database migrations first (atomic deployment requirement)
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Production Supabase
        run: supabase link --project-ref khahcozfbnpykspvatrg
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy migrations to Production
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy to Render (Production)
        run: |
          echo "Triggering Render deployments..."
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_APP_PRODUCTION }}" || echo "App deploy hook failed or not configured"
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_WEB_PRODUCTION }}" || echo "Web deploy hook failed or not configured"
          echo "Deploy hooks triggered. Builds will complete asynchronously."
