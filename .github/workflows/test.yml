name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run unit tests
        run: uv run pytest backend/tests/ -m "not integration" -v --tb=short

  integration-tests-development:
    name: Integration Tests (Development)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra test

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Wait for Supabase to be ready
        run: |
          echo "Waiting for Supabase API..."
          for i in {1..30}; do
            if curl -s http://localhost:54321/rest/v1/ > /dev/null 2>&1; then
              echo "Supabase API is ready"
              exit 0
            fi
            echo "Attempt $i/30: Waiting..."
            sleep 2
          done
          echo "Supabase API did not become ready in time"
          exit 1

      - name: Create .env file for local Supabase
        run: |
          # Get credentials from supabase status
          SUPABASE_URL=$(supabase status --output json | jq -r '.API_URL')
          SUPABASE_ANON_KEY=$(supabase status --output json | jq -r '.ANON_KEY')
          SUPABASE_SERVICE_ROLE_KEY=$(supabase status --output json | jq -r '.SERVICE_ROLE_KEY')

          echo "SUPABASE_URL=${SUPABASE_URL}" > .env
          echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}" >> .env
          echo "SUPABASE_PUBLISHABLE_KEY=${SUPABASE_ANON_KEY}" >> .env
          echo "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}" >> .env
          echo "TEST_USER_EMAIL=test@selko.local" >> .env
          echo "TEST_USER_PASSWORD=testpass123" >> .env

      - name: Create test user
        run: |
          uv run python -m cli.cli_user create \
            --email test@selko.local \
            --password testpass123 \
            --auto-confirm 2>&1 || echo "Note: User may already exist (this is OK)"
        env:
          ENVIRONMENT: development
          TEST_USER_EMAIL: test@selko.local
          TEST_USER_PASSWORD: testpass123

      - name: Run integration tests
        run: uv run pytest backend/tests/integration/ -m "development" -v --tb=short
        env:
          ENVIRONMENT: development
          TEST_USER_EMAIL: test@selko.local
          TEST_USER_PASSWORD: testpass123

      - name: Stop Supabase
        if: always()
        run: supabase stop

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    # Only run on main branch pushes (not PRs, not manual trigger)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [unit-tests, integration-tests-development]
    steps:
      - uses: actions/checkout@v4

      # Deploy database migrations first (atomic deployment requirement)
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Staging Supabase
        run: supabase link --project-ref lxmysergoeaegxlyfzwk
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy migrations to Staging
        run: supabase db push

      # TODO: Deploy FastAPI to Fly.io (uncomment when Fly.io is set up)
      # - name: Setup Fly.io CLI
      #   uses: superfly/flyctl-actions/setup-flyctl@master
      #
      # - name: Deploy FastAPI to Fly.io Staging
      #   run: flyctl deploy --app selko-api-staging --remote-only
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  integration-tests-staging:
    name: Integration Tests (Staging)
    runs-on: ubuntu-latest
    # Only run on main branch pushes (after deployment)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [deploy-staging]  # Run AFTER deployment to test deployed code
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run staging integration tests
        run: uv run pytest backend/tests/integration/ -m "staging" -v --tb=short
        env:
          ENVIRONMENT: staging
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.STAGING_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_EMAIL: ${{ secrets.STAGING_TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.STAGING_TEST_USER_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # Only run on manual workflow_dispatch or git tags
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    # No dependencies - production deployment is independent
    steps:
      - uses: actions/checkout@v4

      # Deploy database migrations first (atomic deployment requirement)
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Production Supabase
        run: supabase link --project-ref khahcozfbnpykspvatrg
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy migrations to Production
        run: supabase db push

      # TODO: Deploy FastAPI to Fly.io (uncomment when Fly.io is set up)
      # - name: Setup Fly.io CLI
      #   uses: superfly/flyctl-actions/setup-flyctl@master
      #
      # - name: Deploy FastAPI to Fly.io Production
      #   run: flyctl deploy --app selko-api --remote-only
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
