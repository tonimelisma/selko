<!doctype html>
<html lang="en" data-theme="selko-light">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			(function () {
				try {
					if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
						document.documentElement.setAttribute('data-theme', 'selko-dark');
					}
				} catch (e) {}

				// Runs before SvelteKit's bootstrap import(). hooks.client.js is too late
				// if the initial entry modules fail to load.
				// One reload max per tab session — never clear the flag here.
				var KEY = 'selko-js-mime-reload';
				window.addEventListener('unhandledrejection', function (event) {
					var reason = event && event.reason;
					var msg = String((reason && reason.message) || reason || '');
					if (msg.indexOf('MIME type') === -1) return;
					try {
						event.preventDefault();
					} catch (e) {}
					try {
						if (sessionStorage.getItem(KEY)) return;
						sessionStorage.setItem(KEY, '1');
					} catch (e) {
						return;
					}
					window.location.reload();
				});
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
